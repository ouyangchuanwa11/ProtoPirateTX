name: Build ProtoPirateTX FAP

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          path: source_code

      - name: Checkout Flipper Zero firmware (Momentum)
        uses: actions/checkout@v4
        with:
          repository: Next-Flip/Momentum-Firmware
          ref: dev
          path: flipperzero-firmware
          fetch-depth: 1

      - name: Copy application source to firmware
        shell: bash
        run: |
          mkdir -p flipperzero-firmware/applications_user/protopirate_tx
          cp -r $GITHUB_WORKSPACE/source_code/* flipperzero-firmware/applications_user/protopirate_tx/
          rm -f flipperzero-firmware/applications_user/protopirate_tx/flipperzero-firmware 2>/dev/null || true
          rm -f flipperzero-firmware/applications_user/protopirate_tx/.github 2>/dev/null || true

      - name: Build fap
        working-directory: ./flipperzero-firmware
        shell: bash
        run: |
          echo "=== CLEAN ==="
          ./fbt clean 2>&1 | tail -3 || true
          echo "=== FBT BUILD START ==="
          ./fbt --extra-ext-apps=protopirate_tx fap_dist 2>&1
          EXITCODE=$?
          echo "=== FBT EXIT CODE: $EXITCODE ==="
          echo "=== GREP ERRORS ==="
          grep -r "FBT ERRORS" build/ -A 5 --include="*.o" 2>/dev/null | head -20 || echo "(no .o)"
          grep -r "error:" build/ --include="*.o" 2>/dev/null | head -20 || echo "(no errors in .o)"
          echo "=== LIST .fap ==="
          find build -name "*.fap" -type f 2>/dev/null || echo "(no .fap)"
          echo "=== DIAG END ==="
          exit $EXITCODE

      - name: Debug output
        if: always()
        working-directory: ./flipperzero-firmware
        shell: bash
        run: |
          echo "=== Any fap files ==="
          find build -name "*.fap" -type f 2>/dev/null || echo "(none)"
          echo "=== GH Actions step 5 should have the real errors ==="

      - name: Upload fap artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: protopirate_tx
          path: flipperzero-firmware/build/**/*.fap
          if-no-files-found: error
