name: Build ProtoPirateTX FAP

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          path: source_code

      - name: Checkout Flipper Zero firmware (Momentum)
        uses: actions/checkout@v4
        with:
          repository: Next-Flip/Momentum-Firmware
          ref: dev
          path: flipperzero-firmware
          fetch-depth: 1

      - name: Copy application source to firmware
        shell: bash
        run: |
          mkdir -p flipperzero-firmware/applications_user/protopirate_tx
          cp -r $GITHUB_WORKSPACE/source_code/* flipperzero-firmware/applications_user/protopirate_tx/
          rm -f flipperzero-firmware/applications_user/protopirate_tx/flipperzero-firmware 2>/dev/null || true
          rm -f flipperzero-firmware/applications_user/protopirate_tx/.github 2>/dev/null || true

      - name: Build fap
        working-directory: ./flipperzero-firmware
        shell: bash
        run: |
          set +e
          ./fbt clean 2>&1 || true
          ./fbt --extra-ext-apps=protopirate_tx fap_dist 2>&1
          EXITCODE=$?
          echo "=== FBT EXIT CODE: $EXITCODE ==="
          exit $EXITCODE

      - name: List build output (with debug)
        if: always()
        working-directory: ./flipperzero-firmware
        shell: bash
        run: |
          echo "=== Build output ==="
          find build -name "*.fap" -type f 2>/dev/null || true
          echo "=== Last 30 lines of build log (looking for errors) ==="
          # Check if there are fbt error artifacts
          find build -name "*.log" -o -name "*.err" 2>/dev/null | head -5 || true
          echo "=== Searching for compilation errors in build directory ==="
          grep -r "FBT ERRORS\|rror:" build/ 2>/dev/null | tail -30 || true
          echo "=== Done ==="

      - name: Upload fap artifact
        uses: actions/upload-artifact@v4
        with:
          name: protopirate_tx
          path: flipperzero-firmware/build/**/*.fap
          if-no-files-found: error

