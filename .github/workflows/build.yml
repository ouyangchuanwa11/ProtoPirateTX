name: Build ProtoPirateTX FAP

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          path: source_code

      - name: Checkout Flipper Zero firmware (Momentum)
        uses: actions/checkout@v4
        with:
          repository: Next-Flip/Momentum-Firmware
          ref: dev
          path: flipperzero-firmware
          fetch-depth: 1

      - name: Copy application source to firmware
        shell: bash
        run: |
          mkdir -p flipperzero-firmware/applications_user/protopirate_tx
          rsync -av --exclude='.github' --exclude='.git' --exclude='flipperzero-firmware' \
            $GITHUB_WORKSPACE/source_code/ \
            flipperzero-firmware/applications_user/protopirate_tx/
          echo "=== Files in app dir ==="
          find flipperzero-firmware/applications_user/protopirate_tx -type f

      - name: Install Python deps
        working-directory: ./flipperzero-firmware
        shell: bash
        run: |
          pip install --quiet -r requirements.txt 2>/dev/null || true

      - name: Build fap
        working-directory: ./flipperzero-firmware
        shell: bash
        run: |
          ./fbt --extra-ext-apps=protopirate_tx fap_dist 2>&1 | tail -200

      - name: Find fap files
        working-directory: ./flipperzero-firmware
        shell: bash
        run: |
          find build -name "*.fap" -type f 2>/dev/null || echo "NO FAP FILES"

      - name: Upload fap artifact
        uses: actions/upload-artifact@v4
        with:
          name: protopirate_tx-fap
          path: flipperzero-firmware/build/**/*.fap
          if-no-files-found: warn