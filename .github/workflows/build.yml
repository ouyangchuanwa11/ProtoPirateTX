name: Build ProtoPirateTX FAP

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          path: source_code

      - name: Checkout Flipper Zero firmware (Momentum)
        uses: actions/checkout@v4
        with:
          repository: Next-Flip/Momentum-Firmware
          ref: dev
          path: flipperzero-firmware
          fetch-depth: 1

      - name: Copy application source to firmware
        shell: bash
        run: |
          mkdir -p flipperzero-firmware/applications_user/protopirate_tx
          cp -r $GITHUB_WORKSPACE/source_code/* flipperzero-firmware/applications_user/protopirate_tx/
          rm -f flipperzero-firmware/applications_user/protopirate_tx/flipperzero-firmware 2>/dev/null || true
          rm -f flipperzero-firmware/applications_user/protopirate_tx/.github 2>/dev/null || true

      - name: Build fap
        working-directory: ./flipperzero-firmware
        shell: bash
        run: |
          ./fbt clean 2>&1 | tail -3
          ./fbt fap_dist 2>&1 | tee /tmp/fbt_build.log
          exit ${PIPESTATUS[0]}

      - name: Upload build log (even if build failed)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/fbt_build.log
          if-no-files-found: warn

      - name: List .fap files
        if: always()
        working-directory: ./flipperzero-firmware
        shell: bash
        run: |
          find build -name "*.fap" -type f 2>/dev/null || echo "(none)"
          # Also output last 30 lines of build log
          echo "=== Last 60 lines of build log ==="
          tail -60 /tmp/fbt_build.log 2>/dev/null || echo "(no log)"
          echo "=== END ==="

      - name: Upload fap artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: protopirate_tx
          path: flipperzero-firmware/build/**/*.fap
          if-no-files-found: error
