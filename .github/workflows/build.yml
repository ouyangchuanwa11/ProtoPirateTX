name: Build ProtoPirateTX FAP

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          path: source_code

      - name: Checkout Flipper Zero firmware (Momentum)
        uses: actions/checkout@v4
        with:
          repository: Next-Flip/Momentum-Firmware
          ref: dev
          path: flipperzero-firmware
          fetch-depth: 1

      - name: Copy application source to firmware
        shell: bash
        run: |
          mkdir -p flipperzero-firmware/applications_user/protopirate_tx
          cp -r $GITHUB_WORKSPACE/source_code/* flipperzero-firmware/applications_user/protopirate_tx/
          rm -f flipperzero-firmware/applications_user/protopirate_tx/flipperzero-firmware 2>/dev/null || true
          rm -f flipperzero-firmware/applications_user/protopirate_tx/.github 2>/dev/null || true

      - name: Build protopirate_tx (single app only)
        id: build
        working-directory: ./flipperzero-firmware
        shell: bash
        run: |
          echo "=== CLEAN ==="
          ./fbt clean 2>&1 | tail -3
          echo "=== BUILD TARGET (fap_protopirate_tx) ==="
          ./fbt fap_protopirate_tx 2>&1 | tee /tmp/fbt.log
          EXITCODE=${PIPESTATUS[0]}
          echo "EXITCODE=$EXITCODE" >> $GITHUB_OUTPUT
          echo "=== LAST 80 LINES ==="
          tail -80 /tmp/fbt.log 2>/dev/null || echo "(no log)"
          echo "=== BUILD FOLDER ==="
          find build -name "*.fap" -type f 2>/dev/null || echo "(no .fap)"
          exit $EXITCODE

      - name: Upload fap artifact
        if: steps.build.outputs.EXITCODE == '0'
        uses: actions/upload-artifact@v4
        with:
          name: protopirate_tx
          path: flipperzero-firmware/build/**/*.fap
          if-no-files-found: error
